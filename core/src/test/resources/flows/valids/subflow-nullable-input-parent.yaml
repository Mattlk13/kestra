id: subflow-nullable-input-parent
namespace: io.kestra.tests

inputs:
  - id: integerValue
    type: INT
    required: false

tasks:
  - id: subflow
    type: io.kestra.plugin.core.flow.Subflow
    namespace: io.kestra.tests
    flowId: subflow-nullable-input-child
    wait: true
    transmitFailed: true
    inputs:
      integerValue: "{{ inputs.integerValue }}"
